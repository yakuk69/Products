<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kurban pathan Electronics</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0d6efd;
color:white;
padding:18px;
text-align:center;
}

header h1{
font-size:28px;
}

header p{
margin-top:5px;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#fff;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.price{
font-size:22px;
color:#0d6efd;
font-weight:bold;
margin:10px 0;
}

.buy{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>kurban pathan Electronics</h1>
<p>Best Electronics Store</p>
</header>

<div class="search">
<input type="text" placeholder="Search Products...">
</div>

<div class="products">
<div class="card">
  <img src="https://picsum.photos/300/200?random=1" alt="Wireless Earbuds">
  <h3>Wireless Earbuds</h3>
  <p class="price">₹999</p>
  <button class="buy" onclick="buy('Wireless Earbuds')">Buy Now</button>
</div>

<div class="card">
  <img src="https://picsum.photos/300/200?random=2" alt="Smart Watch">
  <h3>Smart Watch</h3>
  <p class="price">₹1999</p>
  <button class="buy" onclick="buy('Smart Watch')">Buy Now</button>
</div>
<script>
function buy(product){
  const number = "919303254746"; // अपना WhatsApp नंबर
  const message = "Hello, I want to buy: " + product;
  const url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
