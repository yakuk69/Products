<title>kurban pathan Electronics</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;

}

body{

}

header{
background:#0d6efd;

padding:18px;

}

header h1{

}

header p{

}

.search{

.search input{

padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;

}

.card{

.card h3{

.price{

font-weight:bold;

.buy{
